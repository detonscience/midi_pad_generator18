name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "MIDI_Chord_Generator" --add-data "IMG_3151(1).jpg;." midi_chord_generatorV18.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIDI_Chord_Generator_Windows
          path: dist/MIDI_Chord_Generator.exe
